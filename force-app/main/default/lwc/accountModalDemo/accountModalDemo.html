<template>

    <!-- Create Button -->
    <lightning-button 
        label="Create Account"
        variant="brand"
        onclick={openModal}>
    </lightning-button>

    <!-- Account List -->
    <div class="slds-m-top_medium">
        <template for:each={accounts} for:item="acc">
            <div key={acc.id} class="slds-m-top_medium">
                <p>{acc.name}</p>

                <lightning-button
                    label="Edit"
                    data-id={acc.id}
                    onclick={editHandler}>
                </lightning-button>
            </div>
        </template>
    </div>

    <!-- Modal -->
    <template if:true={isModalOpen}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">New Account</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">

                    <lightning-input
                        label="Account Name"
                        value={accountName}
                        onchange={handleChange}>
                    </lightning-input>

                    <!-- Spinner -->
                    <template if:true={isLoading}>
                        <lightning-spinner 
                            alternative-text="Loading"
                            size="medium">
                        </lightning-spinner>
                    </template>

                </div>

                <footer class="slds-modal__footer">
                    <lightning-button 
                        label="Cancel"
                        onclick={closeModal}>
                    </lightning-button>

                    <lightning-button
                        label="Save"
                        variant="brand"
                        onclick={handleSave}
                        disabled={isLoading}>
                    </lightning-button>
                </footer>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

</template>
