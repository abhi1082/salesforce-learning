<template>
    <div class="slds-grid">
        <div class="slds-col">
            <lightning-card title="Add New Task">
                <div class="slds-p-around_small">
                    <lightning-input 
                        type="text" 
                        label="Enter Task" 
                        placeholder="Enter Task Details" 
                        required="true" 
                        name="taskname"
                        message-when-value-missing="Kindly Enter Task Name"
                        onchange={changeHandler}
                        value={taskname}
                        class="taskname">
                    </lightning-input>
                    <lightning-input 
                        type="date" 
                        label="Set End Date" 
                        name="taskdate"
                        field-level-help="Default End Date is Today's Date"
                        onchange={changeHandler}
                        value={taskdate}>
                    </lightning-input>
                </div>
                <div class="slds-p-around_small">
                    <lightning-button 
                        label="Reset" 
                        variant="brand"
                        class="slds-p-around_small"
                        onclick={resetHandler}>
                    </lightning-button>


                    <lightning-button 
                        label="Add Task" 
                        variant="brand"
                        class="slds-p-around_small"
                        onclick={addTaskHandler}>
                    </lightning-button>
                </div>
            </lightning-card>
        </div>
        
        <div class="slds-col">
            <lightning-card title="To Do List">
                <div class="slds-p-around_small">
                    <template for:each={incompletetask} for:item="currtask" for:index="index">
                        <div 
                            key={currtask.taskname} 
                            class="slds-box slds-theme_shade incompletebg" 
                            draggable="true" 
                            ondragstart={dragStartHandler}
                            data-item={index}
                        >
                            <div class="slds-grid slds-wrap">
                                <div class="slds-col slds-size_9-of-12">
                                    <p class="formattaskname">{currtask.taskname}</p>
                                    <p>
                                        <lightning-formatted-date-time 
                                            value={currtask.taskdate} 
                                            year="2-digit" 
                                            month="short" 
                                            day="2-digit" 
                                            weekday="long">
                                        </lightning-formatted-date-time>
                                    </p>
                                </div>
                                <div class="slds-col slds-size_3-of-12">
                                    <lightning-button-icon 
                                        icon-name="utility:delete"    
                                        variant="border-filled" 
                                        alternative-text="Delete"   
                                        class="slds-m-left_xx-small" 
                                        title="Delete"
                                        onclick={removalHandler}
                                        name={index}>
                                    </lightning-button-icon>
                                    <lightning-button-icon 
                                        icon-name="utility:check"    
                                        variant="border-filled" 
                                        alternative-text="check"   
                                        class="slds-m-left_xx-small" 
                                        title="Delete"
                                        onclick={completeTaskHandler}
                                        name={index}>
                                    </lightning-button-icon>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
                    
            </lightning-card>
        </div>
        
        <div class="slds-col">
            <lightning-card title="Completed Item">
                <div 
                    class="slds-p-around_small" 
                    ondragover={allowDrop} 
                    ondrop={dropElementHandler}
                >
                    <template for:each={completetask} for:item="currtask" for:index="index">
                        <div key={currtask.taskname} class="slds-box slds-theme_shade completebg">    
                            <p class="formattaskname">{currtask.taskname}</p>
                            <p>
                                <lightning-formatted-date-time 
                                    value={currtask.taskdate} 
                                    year="2-digit" 
                                    month="short" 
                                    day="2-digit" 
                                    weekday="long">
                                </lightning-formatted-date-time>
                            </p>
                        </div>
                    </template>
                </div>
            </lightning-card>
        </div>
    </div>
</template>
