<template>
    <lightning-card title="Record Edit Form - Create Mode">
        <lightning-record-edit-form object-api-name={objectApiName} onsuccess={navigateToRecordPage}>
            <div class="slds-p-around_small">
                <lightning-input-field field-name={field.name}></lightning-input-field>
                <lightning-input-field field-name={field.industry}></lightning-input-field>
                <lightning-input-field field-name={field.slaExpiration}></lightning-input-field>
            </div>
            <div class="slds-p-around_small">
                <lightning-button 
                    type="submit" 
                    variant="brand" 
                    label="Create Account">
                </lightning-button>
            </div>
        </lightning-record-edit-form>
    </lightning-card>
</template>
