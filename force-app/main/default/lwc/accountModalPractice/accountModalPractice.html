<template>

    <lightning-card title="Account Modal Practice" icon-name="standard:account">

        <!-- account create button  -->
        <lightning-button
            label="Create Account"
            variant="brand"
            onclick={openModal}>
        </lightning-button>

        <!-- account list  -->
        <div class="slds-m-top_medium">
            <template for:each={accounts} for:item="acc">
                <p key={acc.id}>{acc.name}</p>
            </template>
        </div>

        <!-- modal  -->
        <template if:true={isModalOpen}>
            <section class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">

                    <!-- modal header  -->
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">New Account</h2>
                    </header>

                    <!-- modal content  --> 
                    <div class="slds-modal__content slds-p-around_medium">

                        <!-- input field for account name -->
                        <lightning-input
                            type="text"
                            label="Account Name"
                            value={accountName}
                            onchange={handleChange}>
                        </lightning-input>

                        <!-- spinner  -->
                        <template if:true={isLoading}>
                            <lightning-spinner
                                alternative-text="Loading"
                                size="medium">
                            </lightning-spinner>
                        </template>
                    </div>

                    <!-- modal footer  -->
                    <footer class="slds-modal__footer">
                        
                        <!-- cancel button  -->
                        <lightning-button
                            label="Cancel"
                            onclick={closeModal}>
                        </lightning-button>

                        <!-- save button  -->
                        <lightning-button
                            label="Save"
                            variant="brand"
                            onclick={handleSave}
                            disabled={isLoading}>
                        </lightning-button>

                    </footer>   
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
    
</template>
