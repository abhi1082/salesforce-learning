<template>
	<lightning-card title="Contact Manager">
	
		<!-- Create Button -->
		<lightning-button
			label="Create contact"
			variant="brand"
			onclick={openModal}>
		</lightning-button>
		
		<!-- Contact Display -->
		<template for:each={contacts} for:item="con">
            <div key={con.id} class="slds-m-top_medium">
                <p>{con.firstName} {con.lastName}</p>

                <lightning-button
                    label="Edit"
                    data-id={con.id}
                    onclick={editHandler}>
                </lightning-button>
            </div>
 
		</template>
		
		<!-- Modal -->
		<template if:true={isModalOpen}>
			<section class="slds-modal slds-fade-in-open">
				<div class="slds-modal__container">
				    <!-- Modal Header -->
				    <header class="slds-modal__header">
				    	<p class="slds-text-heading_medium">Contact</p>
				    </header>
                
				    <!-- Modal Content -->
				    <div class="slds-modal__content slds-p-around_medium">
                    
				    	<!-- First Name -->
				    	<lightning-input
				    		type="text"
                            required
				    		value={firstName}
				    		label="First Name"
				    		onchange={inputFirstName}>
				    	</lightning-input>
                    
				    	<!-- Last Name -->
				    	<lightning-input
				    		type="text"
                            required
				    		value={lastName}
				    		label="Last Name"
				    		onchange={inputLastName}>
				    	</lightning-input>
                    
				    	<!-- Spinner -->
				    	<template if:true={isLoading}>
				    		<lightning-spinner
				    			alternative-text="Loading"
				    			size="medium">
				    		</lightning-spinner>
				    	</template>
				    </div>
                
				    <!-- Modal Footer -->
				    <footer class="slds-modal__footer">
                    
				    	<!-- Cancel Button -->
				    	<lightning-button
				    		label="Cancel"
				    		onclick={closeModal}>	
				    	</lightning-button>
                    
				    	<!-- Save Button -->
				    	<lightning-button
				    		label="Save"
                            variant="brand"
				    		onclick={saveHandler}
				    		disabled={isLoading}>
				    	</lightning-button>
				    </footer>
                </div>
			</section>
			<div class="slds-backdrop slds-backdrop_open"></div>
		</template>
	</lightning-card>
</template>
