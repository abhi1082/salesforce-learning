<template>
    <lightning-card title="Input Field">
		<div class="slds-p-horizontal_medium">
			<template for:each={nameList} for:item="listItem">
                <div key={listItem.id} class="slds-m-bottom_small">
                    <p>{listItem.name}</p>

                    <lightning-button 
					    variant="destructive" 
					    label="Delete" 
					    onclick={deleteHandler}
                        data-id={listItem.id}>
				</lightning-button>
                </div>
			</template>
		</div>
        <div class="slds-p-horizontal_medium">
            <lightning-Input 
                type="Text" 
                label="Enter Name"
				value={inputValue}
                onchange={changeHandler}>
            </lightning-Input>
            <lightning-button 
                variant="brand" 
                label="Add Name" 
                onclick={clickHandler}>
            </lightning-button>
        </div>
    </lightning-card>
</template>
