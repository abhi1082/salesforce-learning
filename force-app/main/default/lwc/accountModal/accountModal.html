<template>
    <lightning-modal-header label="Create Account"></lightning-modal-header>

    <lightning-modal-body>

        <lightning-input
            label="Account Name"
            value={accountName}
            onchange={handleChange}>
        </lightning-input>

        <template if:true={isLoading}>
            <lightning-spinner
                alternative-text="Loading"
                size="medium">
            </lightning-spinner>
        </template>

    </lightning-modal-body>

    <lightning-modal-footer>

        <lightning-button
            label="Cancel"
            onclick={handleCancel}
            disabled={isLoading}>
        </lightning-button>

        <lightning-button
            label="Save"
            variant="brand"
            onclick={handleSave}
            disabled={isLoading}>
        </lightning-button>

    </lightning-modal-footer>
</template>
